name: Build APK

# ── متى يشتغل ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
  workflow_dispatch:          # زر "Run workflow" اليدوي في GitHub UI

# ── الـ job ───────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # 1 — استنساخ المشروع
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Java 17 (مطلوب لـ AGP 8.5 + Kotlin 2.0)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3 — تثبيت Gradle 8.9 مباشرةً (المشروع ما فيه wrapper)
      #     بعدها نولّد الـ wrapper لكي ./gradlew يشتغل
      - name: Install Gradle 8.9 and generate wrapper
        run: |
          GRADLE_VERSION=8.9
          wget -q \
            https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip \
            -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH="/opt/gradle/gradle-${GRADLE_VERSION}/bin:$PATH"
          gradle wrapper --gradle-version ${GRADLE_VERSION}
          chmod +x gradlew
          echo "/opt/gradle/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      # 4 — كاش Gradle لتسريع الـ builds القادمة
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 5 — Android SDK: قبول التراخيص + تثبيت android-35
      #     (تم إزالة 2>/dev/null لمنع اختناق العملية)
      - name: Accept Android SDK licenses
        run: |
          yes "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Android Platform 35 + Build Tools
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      # 6 — البناء
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon  \
            --stacktrace \
            --info
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # 7 — رفع الـ APK كـ artifact يمكن تحميله
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/*.apk
